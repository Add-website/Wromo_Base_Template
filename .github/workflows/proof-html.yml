name: Proof HTML
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: anishathalye/proof-html@v1.1.0
        with:
          directory: ./
          output: proof.html
      - name: Upload index.html
        uses: actions/upload-artifact@v3
        with:
          name: proof-html
